<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0e1a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="50%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="orb1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="rgba(99,102,241,0.3)"/>
      <stop offset="100%" stop-color="transparent"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Mesh orbs -->
  <circle cx="200" cy="100" r="250" fill="rgba(99,102,241,0.08)" filter="blur(2px)"/>
  <circle cx="900" cy="500" r="200" fill="rgba(6,182,212,0.08)" filter="blur(2px)"/>
  <circle cx="600" cy="350" r="180" fill="rgba(167,139,250,0.06)" filter="blur(2px)"/>
  <!-- Dot pattern -->
  <pattern id="dots" x="0" y="0" width="32" height="32" patternUnits="userSpaceOnUse">
    <circle cx="16" cy="16" r="0.8" fill="rgba(99,102,241,0.12)"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#dots)"/>
  <!-- Avatar -->
  <rect x="525" y="80" width="150" height="150" rx="32" fill="url(#accent)"/>
  <text x="600" y="175" text-anchor="middle" fill="white" font-family="system-ui,sans-serif" font-weight="900" font-size="56">MA</text>
  <!-- Status dot -->
  <circle cx="665" cy="220" r="14" fill="#10b981" stroke="#0a0e1a" stroke-width="4"/>
  <!-- Name -->
  <text x="600" y="295" text-anchor="middle" fill="#f1f5f9" font-family="system-ui,sans-serif" font-weight="900" font-size="42" letter-spacing="-1">Eng. Mustafa Al-Qadi</text>
  <!-- Role -->
  <text x="600" y="340" text-anchor="middle" fill="#94a3b8" font-family="system-ui,sans-serif" font-weight="500" font-size="22">Enterprise Architect &amp; Cloud Infrastructure Lead</text>
  <!-- Location -->
  <text x="600" y="380" text-anchor="middle" fill="#64748b" font-family="system-ui,sans-serif" font-weight="500" font-size="16">Cloud Management Expert @ Orange Jordan · Amman, Jordan</text>
  <!-- Stats bar -->
  <rect x="200" y="420" width="800" height="1" fill="rgba(99,102,241,0.2)"/>
  <!-- Stats -->
  <text x="270" y="480" text-anchor="middle" fill="#818cf8" font-family="system-ui,sans-serif" font-weight="800" font-size="36">16+</text>
  <text x="270" y="505" text-anchor="middle" fill="#64748b" font-family="system-ui,sans-serif" font-weight="600" font-size="12" letter-spacing="1">YEARS EXPERIENCE</text>
  <text x="470" y="480" text-anchor="middle" fill="#818cf8" font-family="system-ui,sans-serif" font-weight="800" font-size="36">11+</text>
  <text x="470" y="505" text-anchor="middle" fill="#64748b" font-family="system-ui,sans-serif" font-weight="600" font-size="12" letter-spacing="1">CERTIFICATIONS</text>
  <text x="670" y="480" text-anchor="middle" fill="#818cf8" font-family="system-ui,sans-serif" font-weight="800" font-size="36">9+</text>
  <text x="670" y="505" text-anchor="middle" fill="#64748b" font-family="system-ui,sans-serif" font-weight="600" font-size="12" letter-spacing="1">YEARS LEADERSHIP</text>
  <text x="870" y="480" text-anchor="middle" fill="#818cf8" font-family="system-ui,sans-serif" font-weight="800" font-size="36">8</text>
  <text x="870" y="505" text-anchor="middle" fill="#64748b" font-family="system-ui,sans-serif" font-weight="600" font-size="12" letter-spacing="1">TRAINING COURSES</text>
  <!-- Bottom bar -->
  <rect x="200" y="540" width="800" height="1" fill="rgba(99,102,241,0.2)"/>
  <!-- URL -->
  <text x="600" y="580" text-anchor="middle" fill="#6366f1" font-family="system-ui,sans-serif" font-weight="600" font-size="16">mustafamalqadi.github.io</text>
</svg>
