<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 — Page Not Found | Eng. Mustafa Al-Qadi</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%230a0e1a'/%3E%3Ctext x='16' y='21' text-anchor='middle' fill='%236366f1' font-family='system-ui' font-weight='800' font-size='14'%3EMA%3C/text%3E%3C/svg%3E">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Inter',system-ui,sans-serif;background:#0a0e1a;color:#f1f5f9;min-height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative}
        body::before{content:'';position:fixed;top:0;left:0;right:0;bottom:0;background-image:radial-gradient(circle,rgba(99,102,241,.08) 1px,transparent 1px);background-size:32px 32px;pointer-events:none}
        .orb{position:absolute;border-radius:50%;filter:blur(80px);opacity:.35;animation:float 14s ease-in-out infinite}
        .orb-1{width:400px;height:400px;background:radial-gradient(circle,rgba(99,102,241,.4),transparent 70%);top:-10%;left:10%}
        .orb-2{width:350px;height:350px;background:radial-gradient(circle,rgba(6,182,212,.3),transparent 70%);bottom:-5%;right:10%;animation-delay:-5s}
        @keyframes float{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(-15px,10px) scale(.97)}}
        .container{text-align:center;position:relative;z-index:1;padding:2rem}
        .error-code{font-size:8rem;font-weight:900;letter-spacing:-.05em;line-height:1;background:linear-gradient(135deg,#f1f5f9,#818cf8,#22d3ee);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:.5rem}
        .error-title{font-size:1.5rem;font-weight:700;margin-bottom:.75rem;color:#f1f5f9}
        .error-desc{font-size:.95rem;color:#64748b;max-width:420px;margin:0 auto 2rem;line-height:1.7}
        .btn-home{display:inline-flex;align-items:center;gap:.5rem;padding:.75rem 2rem;border-radius:12px;background:linear-gradient(135deg,#6366f1,#4f46e5);color:#fff;text-decoration:none;font-weight:600;font-size:.9rem;transition:all .3s;box-shadow:0 4px 16px rgba(99,102,241,.3)}
        .btn-home:hover{transform:translateY(-2px);box-shadow:0 6px 24px rgba(99,102,241,.4)}
        .links{margin-top:2rem;display:flex;gap:1.5rem;justify-content:center;flex-wrap:wrap}
        .links a{color:#64748b;text-decoration:none;font-size:.82rem;font-weight:500;transition:color .2s}
        .links a:hover{color:#818cf8}
    </style>
</head>
<body>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="container">
        <div class="error-code">404</div>
        <div class="error-title">Page Not Found</div>
        <p class="error-desc">The page you're looking for doesn't exist or has been moved. Let's get you back on track.</p>
        <a href="/" class="btn-home">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
            Back to Home
        </a>
        <div class="links">
            <a href="/vmware-kbs/">VMware Knowledge Base</a>
            <a href="/training-courses/">Training Courses</a>
            <a href="/#contact">Contact</a>
        </div>
    </div>
</body>
</html>
